services:
  doctor-collector:
    build: .
    container_name: doctor-collector
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    environment:
      - STATE_FILE=/app/data/.contacted_therapists.json
      - CSV_FILE=/app/data/therapists.csv
    # Default: collect only. Override command to contact or do both:
    #   docker compose run doctor-collector python -m doctor_collector --contact
    #   docker compose run doctor-collector python -m doctor_collector --collect --contact
    command: ["python", "-m", "doctor_collector", "--collect"]
