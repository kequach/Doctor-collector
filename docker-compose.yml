services:
  doctor-collector:
    image: kequach/doctor-collector:latest
    container_name: doctor-collector
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    environment:
      - STATE_FILE=/app/data/.contacted_therapists.json
      - CSV_FILE=/app/data/therapists.csv
    # Default: collect only. Review ./data/therapists.csv before contacting:
    #   docker compose run --rm doctor-collector python -m doctor_collector --contact
    command: ["python", "-m", "doctor_collector", "--collect"]
